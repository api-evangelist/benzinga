aid: benzinga
url: https://raw.githubusercontent.com/api-evangelist/benzinga/refs/heads/main/apis.yml
name: Benzinga
kind: company
description: Benzinga is a Detroit-based financial media and market data company
  (founded 2010, acquired by Beringer Capital in 2021) that licenses its newsroom
  and data products through a developer-first API platform at docs.benzinga.com.
  Products span real-time financial news (Newsfeed, Press Releases, Why Is It
  Moving), quantified news sentiment, a deep corporate-events Calendar (earnings,
  dividends, ratings, IPOs, splits, economics, FDA, M&A, government and insider
  trades), delayed quotes, historical OHLCV bars, fundamentals, logos, ticker
  trends, and earnings-call transcripts. Delivery is REST over
  https://api.benzinga.com with API-key auth, plus WebSocket streams, a TCP
  streaming service (tcp-v1.benzinga.io:11337), and a data webhook engine.
  OpenAPI and AsyncAPI specs are published in the public Benzinga/benzinga-docs
  GitHub repo. Access is licensing-led with a developer console registration flow;
  no public pricing page.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Financial
